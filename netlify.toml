[build]
  command = "npm run build"
  publish = "out"

[functions]
  directory = "netlify/functions"

# Redirect old domain to new domain
[[redirects]]
  from = "/*"
  to = "https://voqalai.com/:splat"
  status = 301
  force = true
  [redirects.conditions]
    Host = ["arkaisolutions.net", "www.arkaisolutions.net"]

# ── Block WordPress / env / git scanner probes with 410 Gone ──
[[redirects]]
  from = "/xmlrpc.php"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/410"
  status = 410
  force = true

[[redirects]]
