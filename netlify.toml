[build]
  publish = "."
  functions = "netlify/functions"

# Hot-reply watcher: every 2 hours, Mon–Fri, 08:00–18:00 UTC
# Covers UK business hours in both GMT (UTC+0) and BST (UTC+1)
[functions."hot-reply-watcher"]
  schedule = "0 8,10,12,14,16,18 * * 1-5"

[build.processing.html]
  pretty_urls = false

# Redirect old domain to new domain
[[redirects]]
  from = "/*"
  to = "https://voqalai.com/:splat"
  status = 301
  force = true
  [redirects.conditions]
    Host = ["arkaisolutions.net", "www.arkaisolutions.net"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://app.cal.com https://dashboard.retellai.com https://cdn.retellai.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.googletagmanager.com; frame-src https://app.cal.com https://www.googletagmanager.com https://*.retellai.com; connect-src 'self' https://www.google-analytics.com https://app.cal.com https://*.retellai.com; font-src 'self';"

[[headers]]
  for = "/demos/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "microphone=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src *; media-src *; worker-src blob:;"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
