[build]
  command = "npm run build"
  publish = "out"

# Redirect old domain to new domain
[[redirects]]
  from = "/*"
  to = "https://voqalai.com/:splat"
  status = 301
  force = true
  [redirects.conditions]
    Host = ["arkaisolutions.net", "www.arkaisolutions.net"]

# ── Old .html URLs → new clean URLs (301 for SEO) ──

# Core pages
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/pricing.html"
  to = "/pricing/"
  status = 301

[[redirects]]
  from = "/about.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/privacy.html"
  to = "/privacy/"
  status = 301

[[redirects]]
  from = "/terms.html"
  to = "/terms/"
  status = 301

[[redirects]]
  from = "/thank-you.html"
  to = "/thank-you/"
  status = 301

# Pages that existed but now redirect to closest match
[[redirects]]
  from = "/lead-reactivation.html"
  to = "/pricing/#lead-reactivation"
  status = 301

[[redirects]]
  from = "/locations.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/brand-facts.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/integrations.html"
  to = "/#services"
  status = 301

[[redirects]]
  from = "/integrations/*"
  to = "/#services"
  status = 301

# Industry pages → about (industries section)
[[redirects]]
  from = "/ai-receptionist-dental-practices.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/ai-receptionist-law-firms.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/ai-receptionist-medical-practices.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/ai-receptionist-tradesmen.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/ai-receptionist-estate-agents.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/ai-receptionist-accountants.html"
  to = "/about/"
  status = 301

# Blog posts → homepage
[[redirects]]
  from = "/blog/*"
  to = "/"
  status = 301

# Comparison pages → pricing
[[redirects]]
  from = "/compare/*"
  to = "/pricing/"
  status = 301

# Guide pages — specific .html → new clean URLs
[[redirects]]
  from = "/guides/how-to-set-up-ai-receptionist.html"
  to = "/guides/how-to-set-up-ai-receptionist/"
  status = 301

[[redirects]]
  from = "/guides/ai-receptionist-dental-practice-compliance.html"
  to = "/guides/ai-receptionist-dental-practice-compliance/"
  status = 301

[[redirects]]
  from = "/guides/gdpr-compliant-ai-receptionist-uk.html"
  to = "/guides/gdpr-compliant-ai-receptionist-uk/"
  status = 301

[[redirects]]
  from = "/guides/ico-voice-ai-compliance-checklist.html"
  to = "/guides/ico-voice-ai-compliance-checklist/"
  status = 301

# Guide pages — wildcard fallback → homepage
[[redirects]]
  from = "/guides/*"
  to = "/"
  status = 301

# Missing industry page redirects
[[redirects]]
  from = "/ai-receptionist-electricians.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/ai-receptionist-gyms.html"
  to = "/about/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://app.cal.com https://dashboard.retellai.com https://cdn.retellai.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.googletagmanager.com https://*.retellai.com; frame-src https://app.cal.com https://www.googletagmanager.com https://*.retellai.com; connect-src 'self' https://www.google-analytics.com https://app.cal.com https://*.retellai.com; font-src 'self'; media-src 'self' https://d8j0ntlcm91z4.cloudfront.net;"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
