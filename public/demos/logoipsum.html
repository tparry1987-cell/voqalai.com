  <script>
    tailwind.config = {

            inter: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            noto: ['Noto Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fustat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&family=Schibsted+Grotesk:wght@400;500;600;700&display=swap');

    html,

      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      background: #ffffff;
    }

    .video-background {
      position: fixed;
      inset: 0;
      z-index: 0;

      background: #ffffff;
    }

    .video-background video {
      position: absolute;
      top: 0;
      left: 50%;
      width: 115%;
      height: 115%;
      object-fit: cover;
      object-position: center top;
      transform: translateX(-50%);
      opacity: 0;
    }

    .page-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 16px 120px 80px;
    }

    .soft-shadow {
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.12);
    }

    .badge-shadow {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .input-shadow {
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="video-background">

    <main class="page-shell">

          <a href="#">Platform</a>

      <section class="mt-[60px] min-h-[calc(100vh-140px)] flex flex-col items-center justify-center text-center -translate-y-[50px]">

                <path d="M8 1.5L9.78 6.22L14.5 8L9.78 9.78L8 14.5L6.22 9.78L1.5 8L6.22 6.22L8 1.5Z" fill="currentColor"/>
              </svg>
              New
            </span>
            <span class="px-4 py-2 text-black">

          </div>

          <h1 class="font-fustat text-[80px] font-bold leading-none tracking-[-4.8px] text-black">
            Transform Data Quickly
          </h1>

          <p class="w-[542px] max-w-[736px] font-fustat text-[20px] font-medium leading-[1.45] tracking-[-0.4px] text-[#505050]">

        </div>

        <div class="soft-shadow mt-[44px] h-[200px] w-full max-w-[728px] rounded-[18px] bg-[rgba(0,0,0,0.24)] p-4 text-left backdrop-blur-md">

                <path d="M12.25 9.25L12.85 11.15L14.75 11.75L12.85 12.35L12.25 14.25L11.65 12.35L9.75 11.75L11.65 11.15L12.25 9.25Z" fill="currentColor"/>

                  <path d="M7.25 12.25C10.0114 12.25 12.25 10.0114 12.25 7.25C12.25 4.48858 10.0114 2.25 7.25 2.25C4.48858 2.25 2.25 4.48858 2.25 7.25C2.25 10.0114 4.48858 12.25 7.25 12.25Z" stroke="currentColor" stroke-width="1.5"/>

        </div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      var video = document.getElementById('heroVideo');
      var frameId = null;
      var fadingOutRef = false;

      function currentOpacity() {
        var value = parseFloat(window.getComputedStyle(video).opacity);
        return Number.isFinite(value) ? value : 0;
      }

      function cancelFade() {
        if (frameId !== null) {
          cancelAnimationFrame(frameId);
          frameId = null;
        }
      }

      function fadeTo(target, duration, onComplete) {
        cancelFade();

        var start = currentOpacity();
        var startTime = null;

        function tick(timestamp) {
          if (startTime === null) startTime = timestamp;

          var elapsed = timestamp - startTime;
          var progress = Math.min(elapsed / duration, 1);
          var next = start + (target - start) * progress;

          video.style.opacity = String(next);

          if (progress < 1) {
            frameId = requestAnimationFrame(tick);
          } else {
            frameId = null;
            video.style.opacity = String(target);
            if (onComplete) onComplete();
          }
        }

        frameId = requestAnimationFrame(tick);
      }

      function fadeIn() {
        fadingOutRef = false;
        fadeTo(1, 250);
      }

      function fadeOut() {
        fadingOutRef = true;
        fadeTo(0, 250);
      }

      video.addEventListener('loadeddata', function () {
        fadeIn();
      });

      video.addEventListener('play', function () {
        if (currentOpacity() < 1 && !fadingOutRef) {
          fadeIn();
        }
      });

      video.addEventListener('timeupdate', function () {
        if (!video.duration || fadingOutRef) return;

        var remaining = video.duration - video.currentTime;
        if (remaining <= 0.55) {
          fadeOut();
        }
      });

      video.addEventListener('ended', function () {
        cancelFade();
        video.style.opacity = '0';
        fadingOutRef = false;

        setTimeout(function () {
          video.currentTime = 0;
          var playPromise = video.play();

          if (playPromise && typeof playPromise.then === 'function') {
            playPromise.then(function () {
              fadeIn();
            }).catch(function () {
              fadeIn();
            });
          } else {
            fadeIn();
          }
        }, 100);
      });
    })();
  </script>

</html>
