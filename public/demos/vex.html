<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #000;
    }

    .liquid-glass {
      background: rgba(0, 0, 0, 0.4);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 20%,
        rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.1) 80%, rgba(255,255,255,0.3) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .fade-in {
      opacity: 0;
      transition-property: opacity;
      transition-timing-function: ease;
    }

    .fade-in.visible {
      opacity: 1;
    }

    .heading-char {
      display: inline-block;
      opacity: 0;
      transform: translateX(-18px);
      transition-property: opacity, transform;
      transition-duration: 500ms;
      transition-timing-function: ease;
    }

    .heading-char.visible {
      opacity: 1;
      transform: translateX(0);
    }
  </style>
</head>
<body>
  <div id="root">
    <main class="min-h-screen bg-black text-white relative">
      <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover">
        <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260423_084718_72a17915-4964-4059-afcd-22d59399b72e.mp4" type="video/mp4" />
      </video>

      <div class="relative z-10 min-h-screen">
        <nav class="absolute top-0 left-0 right-0 px-6 md:px-12 lg:px-16 pt-6">
          <div class="liquid-glass rounded-xl flex items-center justify-between px-4 py-2">
            <div class="text-2xl font-semibold tracking-tight">VEX</div>

            <div class="hidden md:flex gap-8 text-sm">
              <a href="#" class="hover:text-gray-300 transition-colors">Story</a>
              <a href="#" class="hover:text-gray-300 transition-colors">Investing</a>
              <a href="#" class="hover:text-gray-300 transition-colors">Building</a>
              <a href="#" class="hover:text-gray-300 transition-colors">Advisory</a>
            </div>

            <button class="bg-white text-black px-6 py-2 rounded-lg text-sm font-medium hover:bg-gray-100 transition-colors">
              Start a Chat
            </button>
          </div>
        </nav>

        <section class="min-h-screen px-6 md:px-12 lg:px-16 flex flex-col items-center justify-center text-center">
          <div class="w-full max-w-4xl flex flex-col items-center">
            <h1
              id="animated-heading"
              class="text-4xl md:text-5xl lg:text-6xl xl:text-7xl font-normal mb-4"
              style="letter-spacing:-0.04em"
              data-text="Shaping tomorrow&#10;with vision and action."
              data-delay="200"
              data-char-delay="30"
            ></h1>

            <div class="fade-in" data-fade-delay="800" data-fade-duration="1000">
              <p class="text-base md:text-lg text-gray-300 mb-5">
                We back visionaries and craft ventures that define what comes next.
              </p>
            </div>

            <div class="fade-in" data-fade-delay="1200" data-fade-duration="1000">
              <div class="flex flex-wrap gap-4 justify-center">
                <button class="bg-white text-black px-8 py-3 rounded-lg font-medium hover:bg-gray-100 transition-colors">
                  Start a Chat
                </button>
                <button class="liquid-glass border border-white/20 text-white px-8 py-3 rounded-lg font-medium hover:bg-white hover:text-black transition-colors">
                  Explore Now
                </button>
              </div>
            </div>
          </div>
        </section>

        <div class="absolute bottom-0 left-0 right-0 px-6 md:px-12 lg:px-16 pb-12 lg:pb-16 flex justify-center">
          <div class="fade-in" data-fade-delay="1400" data-fade-duration="1000">
            <div class="liquid-glass border border-white/20 px-6 py-3 rounded-xl">
              <p class="text-lg md:text-xl lg:text-2xl font-light">
                Investing. Building. Advisory.
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var heading = document.getElementById('animated-heading');
      var text = heading.getAttribute('data-text') || '';
      var delay = Number(heading.getAttribute('data-delay') || 200);
      var charDelay = Number(heading.getAttribute('data-char-delay') || 30);
      var lines = text.split('\n');

      heading.innerHTML = '';

      lines.forEach(function (line, lineIndex) {
        var lineEl = document.createElement('div');
        lineEl.className = 'flex flex-wrap justify-center';

        Array.from(line).forEach(function (char, charIndex) {
          var span = document.createElement('span');
          span.className = 'heading-char';
          span.textContent = char === ' ' ? ' ' : char;
          span.style.transitionDelay = (lineIndex * line.length * charDelay + charIndex * charDelay) + 'ms';
          lineEl.appendChild(span);
        });

        heading.appendChild(lineEl);
      });

      setTimeout(function () {
        heading.querySelectorAll('.heading-char').forEach(function (char) {
          char.classList.add('visible');
        });
      }, delay);

      document.querySelectorAll('.fade-in').forEach(function (el) {
        var fadeDelay = Number(el.getAttribute('data-fade-delay') || 0);
        var fadeDuration = Number(el.getAttribute('data-fade-duration') || 800);
        el.style.transitionDuration = fadeDuration + 'ms';

        setTimeout(function () {
          el.classList.add('visible');
        }, fadeDelay);
      });
    })();
  </script>
</body>
</html>
