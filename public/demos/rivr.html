<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RIVR</title>

  <!-- Tailwind (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @font-face {
      font-family: "Helvetica Regular";
      src: url("https://db.onlinewebfonts.com/t/a64ff11d2c24584c767f6257e880dc65.eot");
      src: url("https://db.onlinewebfonts.com/t/a64ff11d2c24584c767f6257e880dc65.eot?#iefix")format("embedded-opentype"),
      url("https://db.onlinewebfonts.com/t/a64ff11d2c24584c767f6257e880dc65.woff2")format("woff2"),
      url("https://db.onlinewebfonts.com/t/a64ff11d2c24584c767f6257e880dc65.woff")format("woff"),
      url("https://db.onlinewebfonts.com/t/a64ff11d2c24584c767f6257e880dc65.ttf")format("truetype"),
      url("https://db.onlinewebfonts.com/t/a64ff11d2c24584c767f6257e880dc65.svg#Helvetica Regular")format("svg");
    }

    :root {
      font-family: "Helvetica Regular", ui-sans-serif, system-ui, sans-serif;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      background-color: #f0f0f0;
    }

    /* mount animations (reproducing motion/react initial→animate) */
    .js-anim { will-change: opacity, transform; }

    /* hover/tap on motion.buttons */
    .btn-press { transition: transform 0.2s ease; }
    .btn-press:hover { transform: scale(1.02); }
    .btn-press:active { transform: scale(0.98); }
  </style>
</head>

<body>
  <main class="min-h-screen bg-[#f0f0f0]">
    <div class="w-full h-screen flex items-center justify-center p-3 md:p-5 bg-[#f0f0f0]">
      <section class="relative w-full max-w-[1536px] h-full rounded-[1.5rem] md:rounded-[3rem] overflow-hidden shadow-none flex flex-col items-center bg-white/10 group">

        <!-- Video background -->
        <video class="absolute inset-0 w-full h-full object-cover object-[65%] lg:object-center z-0" autoplay muted loop playsinline>
          <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260428_193507_4286c423-2fd9-4efd-92bd-91a939453fc1.mp4" type="video/mp4" />
        </video>

        <!-- Content layer -->
        <div class="relative z-10 w-full h-full flex flex-col items-center">

          <!-- Navbar -->
          <nav class="flex items-center justify-between py-6 px-6 md:px-10 w-full relative z-10">
            <div class="flex-1 hidden md:block"></div>

            <ul class="hidden md:flex items-center gap-8 text-[rgb(45,45,45)] font-normal text-sm">
              <li class="cursor-pointer hover:opacity-70 transition-opacity flex items-center gap-1 group">Ecosystem</li>
              <li class="cursor-pointer hover:opacity-70 transition-opacity flex items-center gap-1 group">Economics
                <svg class="w-4 h-4 transition-transform group-hover:translate-x-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
              </li>
              <li class="cursor-pointer hover:opacity-70 transition-opacity flex items-center gap-1 group">Developers</li>
              <li class="cursor-pointer hover:opacity-70 transition-opacity flex items-center gap-1 group">Governance
                <svg class="w-4 h-4 transition-transform group-hover:translate-x-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
              </li>
            </ul>

            <div class="md:hidden"><span class="font-regular tracking-tighter text-xl text-[rgba(30,50,90,0.9)]">RIVR</span></div>

            <div class="flex-1 flex justify-end">
              <button class="btn-press flex items-center bg-[rgba(30,50,90,0.8)] text-white rounded-full pl-2 pr-4 md:pr-6 py-1.5 md:py-2 gap-2 md:gap-3 hover:bg-[rgba(30,50,90,1)] transition-colors group">
                <div class="bg-white/20 p-1 md:p-1.5 rounded-full flex items-center justify-center">
                  <svg class="w-4 h-4 md:w-5 md:h-5 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
                </div>
                <span class="text-xs md:text-sm font-normal">Book Demo</span>
              </button>
            </div>
          </nav>

          <!-- Text container -->
          <div class="w-full flex flex-col items-center pt-8 px-6 text-center max-w-4xl">
            <!-- HeroBadge -->
            <div class="js-anim flex items-center gap-2 px-4 py-2 rounded-full bg-white/60 backdrop-blur-md border border-white/20 mx-auto mb-3 w-fit" style="opacity:0; transform:translateY(20px); transition:opacity .6s ease-out, transform .6s ease-out;">
              <svg class="w-4 h-4 text-[rgba(30,50,90,0.8)]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>
              <span class="text-[14px] font-normal text-[rgba(30,50,90,0.9)]">Fluid Staking</span>
            </div>

            <h1 class="js-anim text-4xl sm:text-5xl md:text-6xl lg:text-[80px] font-normal text-[#5E6470] mb-2 tracking-tight leading-[1.05]" style="opacity:0; transform:scale(0.98); transition:opacity .8s ease, transform .8s ease; transition-delay:.2s;">Fluid Asset Streams</h1>

            <p class="js-anim text-sm sm:text-base md:text-lg text-[#5E6470] opacity-80 leading-relaxed max-w-xl font-normal" style="opacity:0; transition:opacity .8s ease; transition-delay:.4s;">Access Smart Vaults, stake RIVR, NFTs, transform rigid holdings into liquid cash instantly.</p>
          </div>

          <!-- BottomLeftCard -->
          <div class="js-anim absolute bottom-28 right-4 left-auto md:left-6 md:right-auto md:bottom-6 lg:bottom-10 lg:left-10 p-3 md:p-4 lg:p-5 rounded-[1.2rem] md:rounded-[1.5rem] lg:rounded-[2.2rem] bg-white/30 backdrop-blur-xl flex flex-col gap-2 lg:gap-3 min-w-[140px] md:min-w-[150px] lg:min-w-[180px] w-fit" style="opacity:0; transform:translateX(-20px); transition:opacity .8s ease, transform .8s ease; transition-delay:.2s;">
            <div class="flex flex-col">
              <span class="text-2xl md:text-3xl font-normal text-[rgba(30,50,90,0.9)] tracking-tight">5.2K</span>
              <span class="text-[10px] md:text-[12px] font-normal text-[rgba(30,50,90,0.6)] uppercase tracking-wider">Active Yielders</span>
            </div>
            <button class="btn-press flex items-center bg-white rounded-full pl-1.5 pr-5 py-1.5 gap-2 hover:bg-white/90 transition-colors self-start group">
              <div class="bg-[rgba(30,50,90,0.1)] p-1 rounded-full flex items-center justify-center">
                <svg class="w-4 h-4 text-[rgba(30,50,90,0.9)]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
              </div>
              <span class="text-[14px] font-normal text-[rgba(30,50,90,0.9)]">Join Discord</span>
            </button>
          </div>

          <!-- BottomRightCorner -->
          <div class="js-anim absolute bottom-0 right-0 p-3 pt-5 pl-8 sm:p-4 sm:pt-6 sm:pl-10 md:p-6 md:pt-8 md:pl-14 bg-[#f0f0f0] rounded-tl-[1.5rem] sm:rounded-tl-[2rem] md:rounded-tl-[3.5rem] flex items-center gap-3 sm:gap-4 md:gap-6" style="opacity:0; transform:translateY(20px); transition:opacity .8s ease, transform .8s ease; transition-delay:.4s;">
            <!-- Top intersection mask -->
            <div class="absolute -top-[1.5rem] sm:-top-[2rem] md:-top-[3.5rem] right-0 w-[1.5rem] sm:w-[2rem] md:w-[3.5rem] h-[1.5rem] sm:h-[2rem] md:h-[3.5rem] pointer-events-none"><svg width="100%" height="100%" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M56 56V0C56 30.9279 30.9279 56 0 56H56Z" fill="#f0f0f0"/></svg></div>
            <!-- Left intersection mask -->
            <div class="absolute bottom-0 -left-[1.5rem] sm:-left-[2rem] md:-left-[3.5rem] w-[1.5rem] sm:w-[2rem] md:w-[3.5rem] h-[1.5rem] sm:h-[2rem] md:h-[3.5rem] pointer-events-none"><svg width="100%" height="100%" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M56 56H0C30.9279 56 56 30.9279 56 0V56Z" fill="#f0f0f0"/></svg></div>

            <!-- Circle icon -->
            <div class="bg-[rgba(30,50,90,0.05)] w-10 h-10 md:w-14 md:h-14 rounded-full flex items-center justify-center border border-[rgba(30,50,90,0.1)]">
              <svg class="w-5 h-5 md:w-6 md:h-6 text-[rgba(30,50,90,0.8)]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
            </div>

            <!-- Info column -->
            <div class="flex flex-col">
              <div class="text-[16px] md:text-[20px] font-normal text-[rgba(30,50,90,0.95)]">Documentation</div>
              <div class="flex items-center gap-1 text-[rgba(30,50,90,0.6)] cursor-pointer hover:text-[rgba(30,50,90,0.8)] transition-colors">
                <span class="text-[12px] md:text-[15px] font-normal">Library</span>
                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
              </div>
            </div>
          </div>

        </div>
      </section>
    </div>
  </main>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      requestAnimationFrame(function () {
        document.querySelectorAll('.js-anim').forEach(function (el) {
          el.style.opacity = '1';
          el.style.transform = 'none';
        });
      });
    });
  </script>
</body>
</html>
