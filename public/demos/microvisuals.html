<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MicroVisuals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Instrument Serif', 'serif'],
            body: ['Barlow', 'sans-serif'],
            dirtyline: ['Dirtyline', 'sans-serif']
          },
          borderRadius: {
            DEFAULT: '9999px'
          }
        }
      }
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap');

    @font-face {
      font-family: 'Dirtyline';
      src: url('https://fonts.cdnfonts.com/s/15011/Dirtyline36DaysofType.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
    }

    body {
      font-family: 'Barlow', sans-serif;
    }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0)    40%,
        rgba(255,255,255,0)    60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass-strong::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0)   40%,
        rgba(255,255,255,0)   60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .hero-title {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(96px, 18vw, 280px);
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: white;
      text-align: center;
    }

    .mounted-fade {
      opacity: 0;
      transform: translateY(1.5rem);
      transition: opacity 1000ms ease, transform 1000ms ease;
    }

    .mounted-fade.is-mounted {
      opacity: 1;
      transform: translateY(0);
    }

    .mounted-fade-delay {
      opacity: 0;
      transform: translateY(1.5rem);
      transition: opacity 1000ms ease 300ms, transform 1000ms ease 300ms;
    }

    .mounted-fade-delay.is-mounted {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="min-h-screen bg-black text-white font-body overflow-x-hidden">
      <div id="video-bg" class="fixed top-0 left-0 w-full h-full z-0 scale-[1.08] origin-center">
        <video
          id="source-video"
          src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260511_080827_a9e5ad52-b6ee-4e79-b393-d936f179cfd7.mp4"
          muted
          playsinline
          preload="auto"
          crossorigin="anonymous"
          class="w-full h-full object-cover"
          style="display:block"
        ></video>
        <canvas id="display-canvas" class="w-full h-full object-cover" style="display:none"></canvas>
      </div>

      <div id="hero-title-wrap" class="mounted-fade fixed left-0 right-0 z-20 w-full px-4" style="top:126px">
        <h1 class="hero-title select-none">MicroVisuals</h1>
      </div>

      <nav class="fixed top-5 left-1/2 -translate-x-1/2 z-50 whitespace-nowrap">
        <div class="liquid-glass flex items-center gap-6 rounded px-4 py-2.5">
          <svg width="44" height="26" viewBox="0 0 44 26" fill="none" aria-hidden="true">
            <rect x="0" y="3" width="14" height="20" rx="3" fill="white"></rect>
            <rect x="16" y="3" width="12" height="20" rx="3" fill="white"></rect>
            <rect x="30" y="3" width="14" height="20" rx="3" fill="white"></rect>
          </svg>

          <div class="flex items-center gap-5">
            <a href="#" class="text-sm font-body font-light text-white/70 hover:text-white transition-colors duration-200">Gallery</a>
            <a href="#" class="text-sm font-body font-light text-white/70 hover:text-white transition-colors duration-200">Styles</a>
            <a href="#" class="text-sm font-body font-light text-white/70 hover:text-white transition-colors duration-200">API</a>
            <a href="#" class="text-sm font-body font-light text-white/70 hover:text-white transition-colors duration-200">Pricing</a>
            <a href="#" class="text-sm font-body font-light text-white/70 hover:text-white transition-colors duration-200">Blog</a>
          </div>

          <div class="flex items-center gap-3 ml-4">
            <a href="#" class="text-sm font-body font-light text-white/70 hover:text-white transition-colors duration-200">Sign in</a>
            <a href="#" class="liquid-glass-strong text-sm font-body font-medium text-white rounded px-4 py-1.5 transition-all duration-200 hover:scale-[1.04] hover:shadow-[0_0_16px_2px_rgba(255,255,255,0.12)] active:scale-[0.97]">Try it free</a>
          </div>
        </div>
      </nav>

      <div id="bottom-row" class="mounted-fade-delay fixed bottom-12 left-0 right-0 px-10 flex items-end justify-between z-20">
        <p class="text-sm font-body font-light text-white/75 max-w-[220px] leading-relaxed">
          Forma's AI understands context, composition, and style like a creative director would.
        </p>

        <div class="absolute left-1/2 -translate-x-1/2 bottom-0 flex items-center gap-3">
          <button class="group relative bg-white text-black text-sm font-body font-medium rounded px-6 py-3 overflow-hidden active:scale-[0.97] transition-all duration-200 shadow-[0_0_0_0_rgba(255,255,255,0)] hover:shadow-[0_0_24px_4px_rgba(255,255,255,0.25)] hover:scale-[1.03]">
            <span class="relative z-10">Start generating</span>
            <span class="absolute inset-0 bg-gradient-to-b from-white to-white/85 opacity-0 group-hover:opacity-100 transition-opacity duration-200"></span>
          </button>

          <button class="liquid-glass group text-white text-sm font-body font-medium rounded px-6 py-3 active:scale-[0.97] transition-all duration-200 hover:scale-[1.03] hover:shadow-[inset_0_1px_1px_rgba(255,255,255,0.2),0_0_20px_2px_rgba(255,255,255,0.07)]">
            See templates
          </button>
        </div>

        <p class="text-sm font-body font-light text-white/75 max-w-[220px] leading-relaxed text-right">
          Describe what you see in your head — get images that actually match.
        </p>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var NAV_LINKS = ['Gallery', 'Styles', 'API', 'Pricing', 'Blog'];
      var VIDEO_SRC = 'https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260511_080827_a9e5ad52-b6ee-4e79-b393-d936f179cfd7.mp4';

      var video = document.getElementById('source-video');
      var videoBg = document.getElementById('video-bg');
      var displayCanvas = document.getElementById('display-canvas');
      var frames = [];
      var framesReady = false;

      setTimeout(function () {
        document.getElementById('hero-title-wrap').classList.add('is-mounted');
        document.getElementById('bottom-row').classList.add('is-mounted');
      }, 0);

      function setupFrameCapture() {
        var capturing = true;
        var lastTime = -1;
        var MAX_WIDTH = 960;
        var rafId = null;
        var videoFrameHandle = null;

        function captureFrame() {
          if (!capturing || video.readyState < 2 || video.currentTime === lastTime) return;
          lastTime = video.currentTime;

          var scale = Math.min(1, MAX_WIDTH / video.videoWidth);
          var w = Math.max(1, Math.round(video.videoWidth * scale));
          var h = Math.max(1, Math.round(video.videoHeight * scale));
          var offscreen = document.createElement('canvas');
          offscreen.width = w;
          offscreen.height = h;

          var ctx = offscreen.getContext('2d');
          if (!ctx) return;

          try {
            ctx.drawImage(video, 0, 0, w, h);
            frames.push(offscreen);
          } catch (error) {
            capturing = false;
          }
        }

        function requestNext() {
          if (!capturing) return;

          if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
            videoFrameHandle = video.requestVideoFrameCallback(function () {
              captureFrame();
              requestNext();
            });
          } else {
            rafId = requestAnimationFrame(function () {
              captureFrame();
              requestNext();
            });
          }
        }

        function finishCapture() {
          capturing = false;
          if (!frames.length) return;

          framesReady = true;
          video.style.display = 'none';
          displayCanvas.style.display = 'block';
          startBoomerang();
        }

        function onLoaded() {
          video.play().catch(function () {});
          requestNext();
        }

        video.addEventListener('loadedmetadata', onLoaded);
        video.addEventListener('ended', finishCapture);

        if (video.readyState >= 1) onLoaded();

        window.addEventListener('beforeunload', function () {
          capturing = false;
          if (rafId !== null) cancelAnimationFrame(rafId);
          if (videoFrameHandle !== null && video.cancelVideoFrameCallback) {
            video.cancelVideoFrameCallback(videoFrameHandle);
          }
          video.removeEventListener('loadedmetadata', onLoaded);
          video.removeEventListener('ended', finishCapture);
        });
      }

      function startBoomerang() {
        if (!framesReady || !frames.length) return;

        var ctx = displayCanvas.getContext('2d');
        if (!ctx) return;

        displayCanvas.width = frames[0].width;
        displayCanvas.height = frames[0].height;

        var index = 0;
        var direction = 1;
        var last = performance.now();
        var interval = 1000 / 30;
        var rafId = null;

        function render(now) {
          if (now - last >= interval) {
            ctx.drawImage(frames[index], 0, 0);
            index += direction;

            if (index >= frames.length - 1) {
              index = frames.length - 1;
              direction = -1;
            }

            if (index <= 0) {
              index = 0;
              direction = 1;
            }

            last = now;
          }

          rafId = requestAnimationFrame(render);
        }

        rafId = requestAnimationFrame(render);
      }

      function setupParallax() {
        var strength = 20;
        var targetX = 0;
        var targetY = 0;
        var currentX = 0;
        var currentY = 0;

        window.addEventListener('mousemove', function (event) {
          var cx = window.innerWidth / 2;
          var cy = window.innerHeight / 2;
          targetX = ((event.clientX - cx) / cx) * strength;
          targetY = ((event.clientY - cy) / cy) * strength;
        });

        function tick() {
          currentX += (targetX - currentX) * 0.06;
          currentY += (targetY - currentY) * 0.06;

          gsap.set(videoBg, {
            x: currentX,
            y: currentY
          });

          requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
      }

      setupFrameCapture();
      setupParallax();
    })();
  </script>
</body>
</html>
