<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wanderful</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    @font-face {
      font-family: 'Dirtyline';
      src: url('https://fonts.cdnfonts.com/s/15011/Dirtyline36DaysofType.woff') format('woff');
      font-weight: normal; font-style: normal; font-display: swap;
    }

    html, body { margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: #000; }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .hero-headline {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: clamp(40px, 5.4vw, 72px);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    /* mount fade-in */
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 1s ease, transform 1s ease; }
    .reveal.is-in { opacity: 1; transform: translateY(0); }
    .reveal.delay-300 { transition-delay: 300ms; }
  </style>
</head>

<body>
  <div id="root" class="min-h-screen bg-black text-white overflow-x-hidden" style="font-family: 'Inter', sans-serif;">

    <!-- Video background (fixed, full screen, z-0) -->
    <div id="video-bg" class="fixed inset-0 z-0">
      <video
        class="w-full h-full object-cover scale-[1.08] origin-center"
        autoplay muted loop playsinline
        onloadedmetadata="this.playbackRate = 1.25;"
      >
        <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260510_060007_60275ce7-030c-4668-a160-8f364ec537d3.mp4" type="video/mp4" />
      </video>
    </div>

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 px-10 py-8 flex justify-between items-center">
      <div class="text-[17px] font-semibold tracking-tight">Wanderful<sup>TM</sup></div>

      <nav class="liquid-glass rounded-full px-2 py-2 flex items-center gap-1">
        <a href="#" class="text-[11px] font-medium tracking-[0.12em] text-white/90 hover:text-white px-4 py-1.5 rounded-full transition-colors duration-200">JOURNEY</a>
        <a href="#" class="text-[11px] font-medium tracking-[0.12em] text-white/90 hover:text-white px-4 py-1.5 rounded-full transition-colors duration-200">BENEFITS</a>
        <a href="#" class="text-[11px] font-medium tracking-[0.12em] text-white/90 hover:text-white px-4 py-1.5 rounded-full transition-colors duration-200">JOURNAL</a>
        <a href="#" class="text-[11px] font-medium tracking-[0.12em] text-white/90 hover:text-white px-4 py-1.5 rounded-full transition-colors duration-200">GUIDEBOOK</a>
      </nav>

      <a href="#" class="liquid-glass rounded-full px-5 py-2.5 text-[11px] font-medium tracking-[0.12em] text-white/90 hover:text-white">GET ROAMING</a>
    </header>

    <!-- Hero headline -->
    <div class="reveal fixed left-0 right-0 z-20 text-center px-6" style="top: 120px;" id="headline">
      <h1 class="hero-headline text-white">Venture without edges.</h1>
      <h1 class="hero-headline" style="color: rgba(255,255,255,0.55);">Uncover with keen instinct.</h1>
    </div>

    <!-- Bottom block -->
    <div class="reveal delay-300 fixed bottom-14 left-0 right-0 z-20 flex flex-col items-center gap-6 px-6" id="bottom">
      <p class="max-w-[620px] text-[15px] leading-relaxed text-center">
        <span class="text-white">Our smart itineraries shape around you — your rhythm, your vibe, your hunger for adventure.</span><span class="text-white/55"> Each getaway is tailored, seamless, and wholly yours.</span>
      </p>

      <button class="bg-white text-black text-[15px] font-medium rounded-full px-8 py-3.5 transition-all duration-200 hover:scale-[1.03] hover:shadow-[0_0_32px_4px_rgba(255,255,255,0.2)] active:scale-[0.97]">
        Plan my escape today
      </button>

      <div class="flex items-center gap-2 text-[11px] font-medium tracking-[0.14em] text-white/70">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        SECURE BY DESIGN. ZERO DATA LEAKS.
      </div>
    </div>

  </div>

  <script>
    // Mount fade-in
    window.addEventListener('DOMContentLoaded', function () {
      requestAnimationFrame(function () {
        document.getElementById('headline').classList.add('is-in');
        document.getElementById('bottom').classList.add('is-in');
      });
    });

    // GSAP mouse parallax on the video background
    (function () {
      var videoBg = document.getElementById('video-bg');
      var cx = window.innerWidth / 2;
      var cy = window.innerHeight / 2;
      var targetX = 0, targetY = 0, currentX = 0, currentY = 0;

      window.addEventListener('resize', function () {
        cx = window.innerWidth / 2;
        cy = window.innerHeight / 2;
      });

      window.addEventListener('mousemove', function (e) {
        targetX = ((e.clientX - cx) / cx) * 20;
        targetY = ((e.clientY - cy) / cy) * 20;
      });

      function tick() {
        currentX += (targetX - currentX) * 0.06;
        currentY += (targetY - currentY) * 0.06;
        if (window.gsap) gsap.set(videoBg, { x: currentX, y: currentY });
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
