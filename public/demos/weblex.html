<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weblex</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
            secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
            muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
            border: 'hsl(var(--border))'
          }
        }
      }
    };
  </script>
  <style>
    :root {
      --background: 240 67% 1%;
      --foreground: 0 0% 100%;
      --primary: 73 98% 57%;
      --primary-foreground: 240 67% 1%;
      --secondary: 0 0% 100%;
      --secondary-foreground: 240 67% 1%;
      --muted: 240 10% 12%;
      --muted-foreground: 0 0% 82% / 0.8;
      --border: 0 0% 100% / 0.1;
    }
    html, body { margin: 0; padding: 0; }
    body { background: hsl(var(--background)); color: hsl(var(--foreground)); }
  </style>
</head>
<body class="bg-background text-foreground">

  <!-- Navbar -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-transparent">
    <div class="flex items-center justify-between px-6 md:px-10 py-6">
      <!-- Brand -->
      <div class="text-xl font-semibold tracking-tight">Weblex<span class="text-primary">.</span></div>

      <!-- Center links (desktop) -->
      <div class="hidden md:flex items-center gap-8 text-sm text-muted-foreground">
        <a href="#" class="hover:text-foreground transition-colors">Home</a>
        <a href="#" class="hover:text-foreground transition-colors">Features</a>
        <a href="#" class="hover:text-foreground transition-colors">Pricing</a>
        <a href="#" class="hover:text-foreground transition-colors">About</a>
      </div>

      <!-- Right button (desktop) -->
      <button class="hidden md:inline-flex items-center bg-primary text-primary-foreground rounded-full px-5 py-2 text-sm font-medium hover:brightness-110 transition">Get Started</button>

      <!-- Mobile hamburger -->
      <button id="menuToggle" class="md:hidden text-foreground" aria-label="Toggle menu">
        <svg id="iconMenu" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        <svg id="iconClose" class="hidden" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <!-- Mobile dropdown -->
    <div id="mobileMenu" class="hidden md:hidden px-6 pb-6">
      <div class="flex flex-col gap-4 rounded-2xl border border-border bg-background/95 backdrop-blur p-6 text-sm text-muted-foreground">
        <a href="#" class="hover:text-foreground transition-colors">Home</a>
        <a href="#" class="hover:text-foreground transition-colors">Features</a>
        <a href="#" class="hover:text-foreground transition-colors">Pricing</a>
        <a href="#" class="hover:text-foreground transition-colors">About</a>
        <button class="inline-flex items-center justify-center bg-primary text-primary-foreground rounded-full px-5 py-2.5 text-sm font-medium hover:brightness-110 transition">Get Started</button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="relative h-screen w-full overflow-hidden bg-background">
    <video id="heroVideo" autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover" src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260221_085953_8463b46e-ba85-4bb7-912a-1feaf346e970.mp4"></video>

    <div class="absolute inset-x-0 bottom-0 z-10 flex flex-col items-center text-center px-6" style="padding-bottom: 100px;">
      <div class="w-full max-w-[603px] flex flex-col items-center gap-6">
        <span class="inline-flex items-center rounded-full border border-border px-4 py-1.5 text-sm text-muted-foreground">Introducing Smart Website Builder</span>

        <h1 class="font-medium text-[36px] md:text-[48px] lg:text-[62px]" style="line-height: 1.1;">Turn your big idea into a stunning website</h1>

        <p class="text-muted-foreground max-w-[520px]">Fintech is its potential to promote financial inclusion. In many parts of the world, millions of people lack access to traditional banking services.</p>

        <div class="flex flex-wrap items-center justify-center gap-4 mt-2">
          <button class="inline-flex items-center gap-2 bg-primary text-primary-foreground rounded-full px-7 py-3 text-[18px] font-medium hover:brightness-110 transition">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
            Get Started Now
          </button>
          <button class="inline-flex items-center bg-secondary text-secondary-foreground rounded-full px-7 py-3 text-[18px] font-medium hover:brightness-95 transition">See Pricing</button>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Mobile menu toggle
    (function () {
      var toggle = document.getElementById('menuToggle');
      var menu = document.getElementById('mobileMenu');
      var iconMenu = document.getElementById('iconMenu');
      var iconClose = document.getElementById('iconClose');
      toggle.addEventListener('click', function () {
        var open = menu.classList.toggle('hidden') === false;
        iconMenu.classList.toggle('hidden', open);
        iconClose.classList.toggle('hidden', !open);
      });
    })();

    // Seamless loop fade (rAF): fade out from 1.5s before end → 0 by 0.3s before end; fade in over first 1s
    (function () {
      var video = document.getElementById('heroVideo');
      function loop() {
        var d = video.duration;
        if (d && !isNaN(d)) {
          var t = video.currentTime;
          var op = 1;
          if (t < 1) op = t / 1;
          var fadeStart = d - 1.5, fadeZero = d - 0.3;
          if (t >= fadeStart) {
            op = Math.max(0, 1 - (t - fadeStart) / (fadeZero - fadeStart));
          }
          video.style.opacity = String(Math.min(1, Math.max(0, op)));
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
