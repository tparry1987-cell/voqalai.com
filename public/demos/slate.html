<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 200;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1, h2, h3, h4, h5, h6 {
      font-weight: inherit;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      background: #000000;
    }

    .liquid-glass {
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    @keyframes heroFadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-fade-up {
      opacity: 0;
      animation: heroFadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      will-change: transform, opacity;
    }

    .split-line {
      display: block;
      color: #ffffff;
      text-align: center;
    }

    .split-char {
      display: inline-block;
      opacity: 0;
      transform: translateY(40px);
      will-change: transform, opacity;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="relative min-h-screen bg-black overflow-hidden">
      <video
        autoplay
        muted
        loop
        playsinline
        class="absolute inset-0 w-full h-full object-cover"
        src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260425_081506_cfddbdab-90d5-49b8-aa1a-8f52de33d335.mp4"
      ></video>

      <div class="relative z-10 flex flex-col min-h-screen lg:h-screen lg:overflow-hidden">
        <nav class="flex items-center justify-between px-4 sm:px-6 lg:px-10 py-4 lg:py-5">
          <div class="flex items-center gap-3">
            <svg width="22" height="22" viewBox="0 0 256 256" fill="none" aria-hidden="true" class="text-white">
              <path d="M 256 256 L 128 256 L 0 128 L 128 128 Z M 256 128 L 128 128 L 0 0 L 128 0 Z" fill="currentColor"/>
            </svg>
            <div class="text-white font-light text-lg tracking-tight">Slate</div>
          </div>

          <div class="hidden lg:flex items-center gap-8 text-white/70 text-sm">
            <a href="#" class="hover:text-white transition-colors">Our Approach</a>
            <a href="#" class="hover:text-white transition-colors">Products</a>
            <a href="#" class="hover:text-white transition-colors">Story</a>
            <a href="#" class="hover:text-white transition-colors">Resources</a>
            <a href="#" class="hover:text-white transition-colors">Billing</a>
          </div>

          <button
            class="liquid-glass rounded-xl px-4 sm:px-5 py-2 text-white/90 text-xs sm:text-sm font-light"
            style="background: rgba(255,255,255,0.22);"
          >
            Start today
          </button>
        </nav>

        <section class="flex flex-col items-center text-center px-4 sm:px-6 pt-8 sm:pt-12 lg:pt-16 pb-8 sm:pb-10 lg:pb-12 flex-1 justify-center">
          <div class="liquid-glass rounded-full px-3 sm:px-4 py-1.5 mb-4 flex items-center gap-3 hero-fade-up">
            <span class="text-white/80 text-xs sm:text-sm">Welcome to Slate 2.4!</span>
            <span class="text-white/50">|</span>
            <a href="#" class="text-white/70 hover:text-white text-xs sm:text-sm flex items-center gap-1.5">
              Read Guide
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 5L19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
          </div>

          <div
            class="flex flex-col items-center mb-6"
            style="font-size: clamp(36px, 8vw, 76px); letter-spacing: -1.5px; line-height: 1.1; font-weight: 200; text-shadow: 0 2px 20px rgba(0,0,0,0.3);"
          >
            <h1 class="split-line" data-split-text="Grow Your Team"></h1>
            <div style="margin-top: -0.15em;">
              <h1 class="split-line" data-split-text="Thriving"></h1>
            </div>
          </div>

          <p
            class="text-white/65 max-w-md mb-6 leading-relaxed px-2 hero-fade-up"
            style="font-size: clamp(13px, 1.5vw, 17px); line-height: 1.6; animation-delay: 0.6s;"
          >
            Build a thriving hub where your smartest ideas grow<br class="hidden sm:block" />
            smoothly, and your dreams arrive sooner than ever.
          </p>

          <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 sm:gap-4 w-full sm:w-auto max-w-xs sm:max-w-none">
            <button
              class="liquid-glass rounded-xl px-6 sm:px-7 py-2.5 text-white font-light flex items-center justify-center gap-2.5 transition-all duration-200 group hero-fade-up"
              style="background: rgba(255,255,255,0.22); animation-delay: 0.85s;"
            >
              <span style="font-size: 15px;">Start today</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" class="group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform">
                <path d="M7 17L17 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M7 7H17V17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>

            <button
              class="liquid-glass rounded-xl px-6 sm:px-7 py-2.5 text-white font-light flex items-center justify-center gap-2.5 transition-all duration-200 hover:bg-white/8 hero-fade-up"
              style="animation-delay: 1.0s;"
            >
              <span style="font-size: 15px;">Watch demo</span>
            </button>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var lines = document.querySelectorAll('[data-split-text]');

      lines.forEach(function (line) {
        var text = line.getAttribute('data-split-text') || '';
        line.innerHTML = '';

        Array.from(text).forEach(function (char) {
          var span = document.createElement('span');
          span.className = 'split-char';
          span.innerHTML = char === ' ' ? '&nbsp;' : char;
          line.appendChild(span);
        });
      });

      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;

          var chars = entry.target.querySelectorAll('.split-char');

          gsap.to(chars, {
            opacity: 1,
            y: 0,
            duration: 0.8,
            ease: 'power3.out',
            stagger: 0.06
          });

          observer.unobserve(entry.target);
        });
      }, {
        threshold: 0.1,
        rootMargin: '0px'
      });

      lines.forEach(function (line) {
        observer.observe(line);
      });
    })();
  </script>
</body>
</html>
