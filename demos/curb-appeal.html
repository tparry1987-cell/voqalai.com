<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="Tivb7eP0KpHp0TDuL1ohBbOquok_JbGckqwiTHUZHHs" />

  <meta name="description" content="Try the Curb Appeal Photography AI receptionist demo. Hear how Voqal AI handles enquiries, bookings, and client calls with a natural-sounding voice clone.">
  <meta property="og:title" content="Curb Appeal Photography — AI Receptionist Demo | Voqal AI">
  <meta property="og:description" content="Try the Curb Appeal Photography AI receptionist demo. Hear how Voqal AI handles enquiries, bookings, and client calls with a natural-sounding voice clone.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://voqalai.com/demos/curb-appeal.html">
  <meta property="og:site_name" content="Voqal AI">
  <meta property="og:image" content="https://voqalai.com/images/hero-forest.jpg">
  <meta property="og:locale" content="en_GB">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Curb Appeal Photography — AI Receptionist Demo | Voqal AI">
  <meta name="twitter:description" content="Try the Curb Appeal Photography AI receptionist demo from Voqal AI.">
  <meta name="twitter:image" content="https://voqalai.com/images/hero-forest.jpg">
  <link rel="canonical" href="https://voqalai.com/demos/curb-appeal.html">
  <style>
    @font-face {
      font-family: 'Instrument Serif';
      src: url('../fonts/instrument-serif-regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Instrument Serif';
      src: url('../fonts/instrument-serif-italic.woff2') format('woff2');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'Saira';
      src: url('../fonts/saira-latin.woff2') format('woff2');
      font-weight: 300 700;
      font-display: swap;
    }

    :root {
      --accent: #db7c54;
      --accent-light: #e8955e;
      --bg-dark: #070908;
      --text-primary: #f8f9fa;
      --text-secondary: rgba(255,255,255,0.55);
      --text-faint: rgba(255,255,255,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Saira', system-ui, sans-serif;
      background-color: var(--bg-dark);
      background-image: url('../images/hero-forest.webp');
      background-size: cover;
      background-position: center top;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(7,9,8,0.72) 0%, rgba(7,9,8,0.88) 100%);
      pointer-events: none;
    }

    .container {
      position: relative;
      text-align: center;
      max-width: 480px;
      padding: 40px 24px;
      z-index: 1;
    }

    .company {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: 2rem;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    .location {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 60px;
    }

    /* Waveform button */
    .waveform-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: none;
      border: none;
      padding: 20px;
      border-radius: 50%;
      transition: transform 0.3s ease, filter 0.3s ease;
      position: relative;
      margin-bottom: 12px;
    }

    .waveform-btn:hover:not(:disabled) {
      transform: scale(1.08);
      filter: brightness(1.15);
    }

    .waveform-btn:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .waveform-btn svg {
      width: 88px;
      height: 88px;
      overflow: visible;
    }

    /* Ripple ring on active */
    .waveform-btn::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .waveform-btn.active::after {
      opacity: 0.35;
      animation: ring-pulse 2s infinite;
    }

    @keyframes ring-pulse {
      0%   { transform: scale(1);   opacity: 0.35; }
      70%  { transform: scale(1.18); opacity: 0; }
      100% { transform: scale(1);   opacity: 0; }
    }

    .hint {
      font-size: 12px;
      color: var(--text-faint);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .hint.connecting { color: var(--accent); }
    .hint.live { color: #4ade80; }

    .timer {
      font-size: 24px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      min-height: 32px;
      margin-bottom: 4px;
    }

    .end-hint {
      font-size: 11px;
      color: var(--text-faint);
      min-height: 16px;
    }

    .footer {
      margin-top: 64px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
    }

    .footer a {
      color: var(--accent);
      opacity: 0.6;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .footer a:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="company">Curb Appeal Photography</h1>
    <div class="location">Real Estate Media &nbsp;·&nbsp; Atlanta, GA</div>

    <button class="waveform-btn" id="waveBtn" onclick="toggleCall()">
      <svg viewBox="0 0 60 65" fill="none" xmlns="http://www.w3.org/2000/svg" id="waveformSvg">
        <defs>
          <linearGradient id="wf-grad" x1="0" y1="0" x2="0" y2="65">
            <stop offset="0%" stop-color="#e8955e"/>
            <stop offset="100%" stop-color="#db7c54"/>
          </linearGradient>
        </defs>
        <!-- Bar 1 -->
        <rect id="b1" x="0" y="27" width="8" height="22" rx="4" fill="url(#wf-grad)">
          <animate attributeName="height" values="22;7.7;22" dur="1.2s" begin="0s" repeatCount="indefinite"/>
          <animate attributeName="y" values="27;34.15;27" dur="1.2s" begin="0s" repeatCount="indefinite"/>
        </rect>
        <!-- Bar 2 -->
        <rect id="b2" x="13" y="19" width="8" height="38" rx="4" fill="url(#wf-grad)">
          <animate attributeName="height" values="38;13.3;38" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
          <animate attributeName="y" values="19;31.35;19" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
        </rect>
        <!-- Bar 3 -->
        <rect id="b3" x="26" y="11" width="8" height="54" rx="4" fill="url(#wf-grad)">
          <animate attributeName="height" values="54;18.9;54" dur="1.2s" begin="0.1s" repeatCount="indefinite"/>
          <animate attributeName="y" values="11;28.55;11" dur="1.2s" begin="0.1s" repeatCount="indefinite"/>
        </rect>
        <!-- Bar 4 -->
        <rect id="b4" x="39" y="21" width="8" height="34" rx="4" fill="url(#wf-grad)">
          <animate attributeName="height" values="34;11.9;34" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
          <animate attributeName="y" values="21;32.05;21" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
        </rect>
        <!-- Bar 5 -->
        <rect id="b5" x="52" y="29" width="8" height="18" rx="4" fill="url(#wf-grad)">
          <animate attributeName="height" values="18;6.3;18" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
          <animate attributeName="y" values="29;34.85;29" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
        </rect>
      </svg>
    </button>

    <div class="hint" id="hint">Click to speak with Matt's AI receptionist</div>
    <div class="timer" id="timer"></div>
    <div class="end-hint" id="endHint"></div>

    <div class="footer">
      Powered by <a href="https://voqalai.com" target="_blank">Voqal AI</a>
    </div>
  </div>

  <script src="/demos/retell-bundle.js"></script>
  <script>
    const client = new window.RetellWebClient();
    let active = false;
    let timerInt = null;
    let secs = 0;

    const btn = document.getElementById('waveBtn');
    const hint = document.getElementById('hint');
    const timer = document.getElementById('timer');
    const endHint = document.getElementById('endHint');

    function tick() {
      secs++;
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      timer.textContent = m + ':' + s;
    }

    client.on('call_started', () => {
      active = true;
      hint.textContent = 'Connected — speak naturally';
      hint.className = 'hint live';
      endHint.textContent = 'Click to end call';
      btn.classList.add('active');
      btn.disabled = false;
      secs = 0;
      timerInt = setInterval(tick, 1000);
    });

    client.on('call_ended', () => reset());
    client.on('error', () => {
      hint.textContent = 'Connection error — please try again';
      hint.className = 'hint';
      reset();
    });

    function reset() {
      active = false;
      if (timerInt) clearInterval(timerInt);
      timer.textContent = '';
      endHint.textContent = '';
      btn.classList.remove('active');
      btn.disabled = false;
      hint.className = 'hint';
      hint.textContent = 'Click to speak with Matt\'s AI receptionist';
    }

    window.toggleCall = async function () {
      if (active) { client.stopCall(); return; }

      btn.disabled = true;
      hint.textContent = 'Connecting...';
      hint.className = 'hint connecting';

      try {
        const res = await fetch('/.netlify/functions/retell-token', { method: 'POST' });
        const { access_token } = await res.json();
        await client.startCall({ accessToken: access_token });
      } catch {
        hint.textContent = 'Failed to connect — please try again';
        hint.className = 'hint';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
