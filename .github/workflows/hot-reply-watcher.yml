name: Hot-Reply Watcher

on:
  schedule:
    # Every 2 hours, 08:00–16:00 UTC — covers 09:00–17:00 BST and 09:00–17:00 GMT
    - cron: "0 8,10,12,14,16 * * 1-5"
  workflow_dispatch: {}   # allow manual trigger for testing

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: pip install -r agents/requirements.txt

      - name: Run hot-reply watcher
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          INSTANTLY_API_KEY:    ${{ secrets.INSTANTLY_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          UK_CAMPAIGN_ID:       ${{ secrets.UK_CAMPAIGN_ID }}
          US_CAMPAIGN_ID:       ${{ secrets.US_CAMPAIGN_ID }}
        run: python agents/hot_reply_watcher.py
